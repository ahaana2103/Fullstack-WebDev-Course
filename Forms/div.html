<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>University Portal</title>
<style>
  /* Reset and basic styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
  }

  /* Header */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: #2c3e50;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 1000;
  }

  header h1 {
    font-size: 18px;
  }

  nav a {
    color: #fff;
    margin-left: 20px;
    text-decoration: none;
  }

  /* Sidebar toggle */
  #sidebar-toggle {
    display: none;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
    gap: 5px;
  }

  .hamburger span {
    width: 25px;
    height: 3px;
    background: #fff;
  }

  /* Sidebar */
  .sidebar {
    position: fixed;
    top: 60px;
    left: -250px;
    width: 250px;
    height: 100%;
    background: #34495e;
    color: #fff;
    padding-top: 20px;
    transition: left 0.3s;
  }

  .sidebar a {
    display: block;
    color: #fff;
    padding: 15px 20px;
    text-decoration: none;
  }

  .sidebar a:hover {
    background: #2c3e50;
  }

  /* Sidebar toggle effect using checkbox hack */
  #sidebar-toggle:checked ~ .sidebar {
    left: 0;
  }

  /* Main content */
  .main-content {
    margin-top: 60px;
    margin-left: 0;
    padding: 20px;
    transition: margin-left 0.3s;
  }

  #sidebar-toggle:checked ~ .main-content {
    margin-left: 250px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .hamburger {
      display: flex;
    }

    nav {
      display: none;
    }

    #sidebar-toggle:checked ~ .main-content {
      margin-left: 0;
    }
  }
</style>
</head>
<body>

<input type="checkbox" id="sidebar-toggle">
<header>
  <div class="left">
    <label for="sidebar-toggle" class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </label>
    <h1>University Portal</h1>
  </div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Courses</a>
    <a href="#">Profile</a>
  </nav>
</header>

<div class="sidebar">
  <a href="#">Dashboard</a>
  <a href="#">Courses</a>
  <a href="#">Settings</a>
  <a href="#">Logout</a>
</div>

<div class="main-content">
  <h2>Welcome to the University Dashboard</h2>
  <p>This is your main content area. Resize the window or use the hamburger icon to see the responsive behavior.</p>
</div>

</body>
</html>
