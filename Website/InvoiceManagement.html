<!DOCTYPE html>
<html>
<head>
    <title>Invoice Management System</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }
        input {
            margin: 5px;
            padding: 6px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        .delete-btn {
            background: red;
            color: white;
            padding: 4px 10px;
            border: none;
            cursor: pointer;
        }
        .delete-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h2>Invoice Management System</h2>

<!-- Input Form -->
<input type="text" id="invNum">
<input type="text" id="custName">
<input type="text" id="itemName">
<input type="number" id="qty">
<input type="number" id="price">

<button onclick="addInvoice()">Add Invoice</button>

<!-- Table -->
<table>
    <thead>
        <tr>
            <th>Invoice No</th>
            <th>Customer</th>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="invoiceTable"></tbody>
</table>

<script>
    let invoices = [];

    function addInvoice() {
        let inv = document.getElementById("invNum").value.trim();
        let cust = document.getElementById("custName").value.trim();
        let item = document.getElementById("itemName").value.trim();
        let qty = Number(document.getElementById("qty").value);
        let price = Number(document.getElementById("price").value);

        // VALIDATION
        if (!inv || !cust || !item || !qty || !price) {
            alert("All fields are required!");
            return;
        }
        if (qty <= 0 || price <= 0) {
            alert("Quantity & Price must be positive!");
            return;
        }
        if (invoices.some(x => x.invoiceNo === inv)) {
            alert("Invoice number must be unique!");
            return;
        }

        // CREATE INVOICE OBJECT
        let invoice = {
            invoiceNo: inv,
            customer: cust,
            item: item,
            qty: qty,
            price: price,
            total: qty * price
        };

        invoices.push(invoice);
        displayInvoices();

        // CLEAR FIELDS
        document.getElementById("invNum").value = "";
        document.getElementById("custName").value = "";
        document.getElementById("itemName").value = "";
        document.getElementById("qty").value = "";
        document.getElementById("price").value = "";
    }

    function displayInvoices() {
        let table = document.getElementById("invoiceTable");
        table.innerHTML = "";

        invoices.forEach((inv, index) => {
            let row = `
                <tr>
                    <td>${inv.invoiceNo}</td>
                    <td>${inv.customer}</td>
                    <td>${inv.item}</td>
                    <td>${inv.qty}</td>
                    <td>₹${inv.price}</td>
                    <td>₹${inv.total}</td>
                    <td><button class="delete-btn" onclick="deleteInvoice(${index})">Delete</button></td>
                </tr>
            `;
            table.innerHTML += row;
        });
    }

    function deleteInvoice(index) {
        invoices.splice(index, 1);
        displayInvoices();
    }
</script>

</body>
</html>
